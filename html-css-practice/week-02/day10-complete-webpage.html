<!DOCTYPE html>
<html>
<head>
<title>Portfolio Webpage</title>
<style>
/* CSS variables for theming */
:root {
    --primary: #007bff;
    --secondary: #6c757d;
    --light: #f8f9fa;
    --dark: #343a40;
}

/* Smooth scroll */
html {
    scroll-behavior: smooth;
}

/* Sticky header */
header {
    position: sticky;
    top: 0;
    background: var(--dark);
    color: white;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

/* Hero section */
.hero {
    height: 100vh;
    background: linear-gradient(45deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    animation: fadeIn 2s;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Skills grid */
.skills {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 50px;
}

/* Projects flex */
.projects {
    display: flex;
    gap: 20px;
    padding: 50px;
    overflow-x: auto;
}

.project-card {
    min-width: 300px;
    background: var(--light);
    padding: 20px;
    border-radius: 5px;
}

/* Contact form */
.contact {
    padding: 50px;
    background: var(--light);
}

form {
    max-width: 500px;
    margin: 0 auto;
}

/* Footer */
footer {
    background: var(--dark);
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>
<body>

<header>
    <div>Logo</div>
    <nav>
        <a href="#hero">Home</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="hero" class="hero">
    <div>
        <h1>Welcome to My Portfolio</h1>
        <p>I'm a web developer</p>
    </div>
</section>

<section id="skills" class="skills">
    <div>HTML</div>
    <div>CSS</div>
    <div>JavaScript</div>
    <div>React</div>
</section>

<section id="projects" class="projects">
    <div class="project-card">Project 1</div>
    <div class="project-card">Project 2</div>
    <div class="project-card">Project 3</div>
</section>

<section id="contact" class="contact">
    <h2>Contact Me</h2>
    <form>
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <textarea placeholder="Message"></textarea>
        <button type="submit">Send</button>
    </form>
</section>

<footer>
    <p>&copy; 2025 My Portfolio</p>
</footer>

</body>
</html>
